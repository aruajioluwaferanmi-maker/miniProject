name: CD

on:
  push:
    branches:
      - staging
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Backend install and test
        run: |
          cd backend
          npm ci
          npm test

      - name: Frontend install and build
        run: |
          cd frontend
          npm ci
          npm run build

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: quality-gate
    if: |
      github.ref == 'refs/heads/staging' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment: staging
    steps:
      - name: Trigger staging deploy hook
        env:
          STAGING_DEPLOY_HOOK_URL: ${{ secrets.STAGING_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$STAGING_DEPLOY_HOOK_URL" ]; then
            echo "Missing STAGING_DEPLOY_HOOK_URL secret"
            exit 1
          fi
          curl -fsSL -X POST "$STAGING_DEPLOY_HOOK_URL"

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: quality-gate
    if: |
      github.ref == 'refs/heads/main' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment: production
    steps:
      - name: Trigger production deploy hook
        env:
          PRODUCTION_DEPLOY_HOOK_URL: ${{ secrets.PRODUCTION_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$PRODUCTION_DEPLOY_HOOK_URL" ]; then
            echo "Missing PRODUCTION_DEPLOY_HOOK_URL secret"
            exit 1
          fi
          curl -fsSL -X POST "$PRODUCTION_DEPLOY_HOOK_URL"
